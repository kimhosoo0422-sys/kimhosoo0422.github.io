<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>익명 커뮤니티</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#111827;color:#fff;padding:18px;text-align:center;font-size:24px;font-weight:bold}
.container{max-width:900px;margin:24px auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:18px}
input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #d1d5db;border-radius:10px;box-sizing:border-box}
button{background:#2563eb;color:#fff;border:none;padding:10px 16px;border-radius:10px;cursor:pointer}
button:hover{opacity:.92}
.post{border-top:1px solid #e5e7eb;padding:14px 0}
.meta{color:#6b7280;font-size:12px;margin-bottom:8px}
.title{font-size:18px;font-weight:bold;margin-bottom:6px}
.small{font-size:12px;color:#6b7280}
</style>
</head>
<body>
<header>익명 커뮤니티</header>
<div class="container">
  <div class="card">
    <h3>글 작성</h3>
    <input id="title" placeholder="제목">
    <textarea id="content" rows="5" placeholder="내용을 입력하세요"></textarea>
    <button onclick="addPost()">등록</button>
    <p class="small">브라우저 저장(localStorage) 방식입니다.</p>
  </div>
  <div class="card">
    <h3>게시글</h3>
    <div id="posts"></div>
  </div>
</div>
<script>
function getPosts(){return JSON.parse(localStorage.getItem('anon_posts')||'[]')}
function savePosts(posts){localStorage.setItem('anon_posts',JSON.stringify(posts))}
function addPost(){
 const title=document.getElementById('title').value.trim();
 const content=document.getElementById('content').value.trim();
 if(!title||!content){alert('제목과 내용을 입력하세요.');return;}
 const posts=getPosts();
 posts.unshift({id:Date.now(),title,content,date:new Date().toLocaleString('ko-KR')});
 savePosts(posts);
 document.getElementById('title').value='';
 document.getElementById('content').value='';
 renderPosts();
}
function deletePost(id){
 const posts=getPosts().filter(p=>p.id!==id);
 savePosts(posts); renderPosts();
}
function renderPosts(){
 const wrap=document.getElementById('posts');
 const posts=getPosts();
 if(posts.length===0){wrap.innerHTML='<p>아직 글이 없습니다.</p>';return;}
 wrap.innerHTML=posts.map(p=>`
 <div class='post'>
   <div class='meta'>익명 · ${p.date}</div>
   <div class='title'>${escapeHtml(p.title)}</div>
   <div>${escapeHtml(p.content).replace(/\n/g,'<br>')}</div>
   <div style='margin-top:10px'><button onclick='deletePost(${p.id})'>삭제</button></div>
 </div>`).join('');
}
function escapeHtml(text){const div=document.createElement('div');div.innerText=text;return div.innerHTML;}
renderPosts();
</script>
</body>
</html>
